<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts para um ar mais profissional -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
        .navbar-brand { font-weight: 600; }
        .main-container { min-height: 80vh; padding-top: 2rem; }
    </style>

    <title>{% block title %}Sistema ART{% endblock %}</title>
</head>
<body>

    <!-- Navbar Responsiva -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">📊 Sistema ART</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'home' %}">Home</a>
                    </li>
                </ul>
                
                <div class="d-flex align-items-center">
                    {% if user.is_authenticated %}
                        <span class="navbar-text me-3 text-light">
                            Olá, <strong>{{ user.username }}</strong>
                        </span>
                        <a href="{% url 'password_change' %}" class="btn btn-outline-light btn-sm me-2">Trocar Senha</a>
                        <form action="{% url 'logout' %}" method="post" style="display:inline; margin:0;">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-danger btn-sm">Sair</button>
                        </form>
                    {% else %}
                        <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm me-2">Login</a>
                        <a href="{% url 'singup' %}" class="btn btn-primary btn-sm">Cadastro</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <!-- Conteúdo Principal -->
    <main class="container main-container">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="py-4 text-center text-muted">
        <small>&copy; 2024 Emissor de ART Profissional</small>
    </footer>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
